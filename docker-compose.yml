version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: esatellite_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: esatellite
      POSTGRES_PASSWORD: esatellite123
      POSTGRES_DB: esatellite
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: